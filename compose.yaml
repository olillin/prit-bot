# DO NOT USE IN PRODUCTION, THIS CONFIGURATION IS INTENTIONALLY INSECURE

# This compose file runs the database for development.
# Copy .env.example and fill out your Discord bot token to get started.

name: prit-bot

services:
    db:
        image: postgres:18
        container_name: prit-bot-dev-db
        restart: unless-stopped
        user: postgres
        environment:
            - POSTGRES_DB=spill-the-tea
            - POSTGRES_PASSWORD=secret-dev-password

        ports:
            - '5432:5432'

        healthcheck:
            test: ['CMD', 'pg_isready']
            interval: 10s
            timeout: 5s
            retries: 5
